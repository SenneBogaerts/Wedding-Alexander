<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Message</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                 "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #f5f7fa, #dfe9f3);
    color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
}

.card {
    background: white;
    width: 100%;
    max-width: 420px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

.hero img {
    width: 100%;
    display: block;
    object-fit: cover;
}

.content {
    padding: 28px;
}

h1 {
    font-size: 2rem;
    margin-bottom: 12px;
    text-align: center;
}

.subtitle {
    color: #777;
    text-align: center;
    margin-bottom: 24px;
}

.message {
    font-size: 1.1rem;
    line-height: 1.7;
    text-align: center;
    margin-bottom: 28px;
}

.footer {
    border-top: 1px solid #eee;
    padding-top: 18px;
    text-align: center;
    color: #888;
    font-size: 0.95rem;
}

.button {
    display: inline-block;
    margin-top: 20px;
    background: #007AFF;
    color: white;
    text-decoration: none;
    padding: 14px 26px;
    border-radius: 14px;
    font-weight: 600;
    transition: .2s;
}

.button:hover {
    background: #0064d2;
}

@media (prefers-color-scheme: dark) {
    body {
        background: linear-gradient(135deg,#1b1b1b,#2d2d2d);
    }

    .card {
        background: #222;
        color: white;
    }

    .subtitle,
    .footer {
        color: #bdbdbd;
    }

    .footer {
        border-color: #333;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="hero">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1200"
             alt="Your picture">
    </div>

    <div class="content">

        <h1>🎉 Happy Birthday Dad! 🎉</h1>

        <p class="subtitle">
            We made something special just for you.
        </p>

        <div class="message">
            Thank you for always being there, making us laugh,
            and being the world's best BBQ master.
            <br><br>
            We hope this day is as amazing as you are.
            ❤️
        </div>

        <div style="text-align:center;">
            <a class="button" href="#">
                ❤️ Love You
            </a>
        </div>

        <div class="footer">
            Made with love by your family
        </div>

    </div>

</div>

</body>
</html>
